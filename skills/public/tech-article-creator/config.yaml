# ============================================================
# tech-article-creator 配置模板
# ============================================================
# 这是模板文件，包含完整注释和默认值。
# 首次使用时复制到文章根目录：{root_dir}/.tech-article-creator.yaml
# 通过交互式引导填写核心配置，后续可手动编辑。
# 所有配置项都有默认值，未配置的功能将被跳过或使用本地模式。

# 配置版本号（用于兼容性检查，缺失字段用默认值补全）
config_version: 1

# ------------------------------------------------------------
# 文章目录结构
# ------------------------------------------------------------
workspace:
  # 文章根目录。留空则从当前工作目录推断，首次使用时交互确认。
  root_dir: ""

  # 单篇文章目录命名模板
  # 可用变量: {index}, {title}, {slug}, {date}
  # 示例: "{index}-{title}", "{date}-{slug}", "{title}"
  article_dir_template: "{index}-{title}"

  # 是否启用序号（启用后自动递增）
  index_enabled: true

  # 选题文件存放目录名
  topics_dir: "选题"

# ------------------------------------------------------------
# 版本配置
# ------------------------------------------------------------
# 支持 1~N 个版本。每个版本有独立的写作风格、目标读者和文件命名。
# 默认配置为"技术深度版"+"通俗故事版"双版本模式。
# 如只需单版本，删除其中一个即可。
variants:
  - id: "blog"
    # 文件名前缀，如 【Blog版】标题.md
    file_prefix: "【Blog版】"
    # 目标读者描述（写入 writer prompt）
    target_audience: "开发者、技术人员"
    # 建议字数范围
    word_count: "4000-5000"
    # 写作风格关键词（传递给 writer）
    style: "技术深度、完整代码、配置可复现、成本分析"

  - id: "wechat"
    file_prefix: "【公众号版】"
    target_audience: "非技术读者、管理者、对 AI 感兴趣的泛人群"
    word_count: "2500-3000"
    style: "故事驱动、类比解释、短段落、手机友好、引流技术版"

# ------------------------------------------------------------
# 评审配置
# ------------------------------------------------------------
review:
  # 大纲评审（阶段 4）和终稿评审（阶段 6）使用的外部模型。
  # 留空数组则跳过外部评审，只用 Agent Team 内部评审。
  # 每个模型需指定 provider（调用方式）和 role（评审角色）。
  models: []
  # 示例:
  # models:
  #   - name: "codex"
  #     provider: "codex-mcp"        # 调用方式: codex-mcp / gemini-cli / openai-api
  #     role: "对抗审查员"            # 评审角色: 侧重事实/逻辑/脱敏
  #   - name: "gemini"
  #     provider: "gemini-cli"
  #     role: "编辑顾问"              # 评审角色: 侧重可读性/差异化/行动路径

  # 评审通过标准：无高/中严重度问题即视为通过
  pass_criteria: "no_high_medium"

# ------------------------------------------------------------
# 写作团队配置（Agent Team）
# ------------------------------------------------------------
writing_team:
  # 是否使用 Agent Team 并行写作（需要运行时支持 subagent）
  # false 时改为串行写作：依次完成每个版本
  parallel: true

  # 评审员配置
  reviewers:
    - role: "tech-reviewer"
      focus: "事实准确性、代码可执行性、数据口径一致、脱敏彻底"
    - role: "content-reviewer"
      focus: "AI痕迹检测、可读性、版本差异化、读者行动路径"

# ------------------------------------------------------------
# 图片生成（可选）
# ------------------------------------------------------------
image:
  # 是否启用配图阶段
  enabled: false

  # 图片生成 skill 名称（如用户已安装的图片生成 skill）
  # 留空则跳过自动生成，只预留占位符供手动补充
  skill: ""

  # 配图类型
  types:
    - "封面图"       # 带精简标题的封面
    - "架构/流程图"  # 文章核心示意图
    # - "工具截图"   # 需用户手动提供

  # 图片存放子目录名
  output_dir: "cover-image"

# ------------------------------------------------------------
# 发布平台（可选）
# ------------------------------------------------------------
# 默认只生成本地 markdown 文件，不发布到任何平台。
# 启用发布需配置对应平台。
publish:
  # 启用的平台列表
  platforms: []

  # 各平台详细配置（仅在 platforms 列表中包含时生效）
  blog:
    # 博客发布 skill 名称
    skill: ""
    # 博客 URL（用于生成内链）
    url: ""

  wechat:
    # Markdown → HTML 转换 skill
    converter_skill: ""
    # 微信发布 skill
    publisher_skill: ""

  x:
    # X/Twitter 发布 skill
    skill: ""

# ------------------------------------------------------------
# 合规与安全
# ------------------------------------------------------------
compliance:
  # 平台合规规范文件路径（相对于 root_dir）
  # 如有，写作和评审时自动加载。留空则跳过。
  rules_file: ""

  # 是否要求案例脱敏
  redaction_required: true

  # 脱敏策略描述
  redaction_strategy: "项目名→'某项目'，表名/路径通用化，用户确认脱敏程度"
